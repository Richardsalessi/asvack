<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Registro</h2>
        <form id="registerForm">
            <input type="text" id="registerNombre" placeholder="Nombre Completo" required>
            <input type="email" id="registerEmail" placeholder="Correo Electrónico" required>

            <label for="registerPrefijo">Prefijo</label>
            <select id="registerPrefijo" required>
                <option value="+1">🇺🇸 +1 (EE.UU.)</option>
                <option value="+57">🇨🇴 +57 (Colombia)</option>
                <option value="+52">🇲🇽 +52 (México)</option>
                <option value="+34">🇪🇸 +34 (España)</option>
            </select>

            <input type="text" id="registerTelefono" placeholder="Número de Teléfono" required>

            <input type="password" id="registerPassword" placeholder="Contraseña" required>
            <button type="submit">Registrarse</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
